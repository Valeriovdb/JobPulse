name: Daily Ingestion

on:
  schedule:
    # 07:00 UTC Monday–Friday only
    - cron: "0 7 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (fetch and normalize, no DB writes)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      date_posted:
        description: "JSearch date window — use 'week' to backfill last 7 days"
        required: false
        default: "3days"
        type: choice
        options: ["today", "3days", "week", "month"]

jobs:
  ingest:
    name: Run ingestion pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          JSEARCH_DATE_POSTED: ${{ github.event.inputs.date_posted || '3days' }}
          CLASSIFIER_VERSION: "v1"
          ACTIVE_GRACE_DAYS: "1"
        run: python -m pipeline.ingest

      - name: Export frontend data
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python -m pipeline.export_data

      - name: Commit frontend data
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/frontend/
          git diff --cached --quiet || git commit -m "chore: update frontend data [skip actions]"
          git push
